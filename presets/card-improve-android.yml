event_loop:
  prompt_file: "presets/card-improve-android-prompt.md"
  starting_event: "improve.start"
  max_iterations: 200
  max_runtime_seconds: 14400  # 4 hours
  checkpoint_interval: 1
  # No completion_promise -- infinite loop, user cancels when done

cli:
  backend: "opencode"
  # Uses openrouter/hunter-alpha model via opencode.
  # Auth: run `opencode auth login` and select OpenRouter.
  # Model override: .opencode/oh-my-opencode.json routes Sisyphus agent to hunter-alpha.
  # Override model at runtime: OPENCODE_MODEL env var or opencode.json.

hooks:
  enabled: true
  events:
    pre.loop.start:
      - name: "postgres-check"
        command: ["bash", "-c", "docker exec ankiatlas-postgres pg_isready -U ankiatlas -d ankiatlas -t 3"]
        on_error: block
        timeout_seconds: 10
      - name: "qdrant-check"
        command: ["curl", "-sf", "http://localhost:6333/readyz"]
        on_error: block
        timeout_seconds: 10
      - name: "redis-check"
        command: ["bash", "-c", "docker exec ankiatlas-redis redis-cli ping | grep -q PONG"]
        on_error: block
        timeout_seconds: 10

skills:
  enabled: true
  dirs:
    - ".claude/skills"

hats:
  selector:
    name: "Card Selector"
    description: "Pick the next Android card to improve, skipping already-processed cards"
    triggers:
      - "improve.start"
      - "round.done"
    publishes:
      - "card.selected"
    instructions: |
      ## Select Next Android Card

      You are the Card Selector. Pick ONE unprocessed card from the **Android** deck.

      ### Process

      1. Read `.ralph/card-progress.md` (create if missing with header row)
      2. Collect already-processed card IDs into a skip list
      3. Find the next card using priority order (Android deck only):
         a. `cargo run --bin anki-atlas -- validate --quality 2>&1 | head -20` (filter for Android deck)
         b. `cargo run --bin anki-atlas -- weak-notes --topic "android" 2>&1 | head -20`
         c. `cargo run --bin anki-atlas -- gaps "android" --min-coverage 1 2>&1 | head -20`
         d. `cargo run --bin anki-atlas -- duplicates --deck "Android" --threshold 0.92 2>&1 | head -10`
      4. Pick the FIRST card not in the skip list
      5. Only select cards from the Android deck

      ### Output

      Write to `.ralph/scratchpad.md`:
      ```
      ## Selected Card
      - ID: <card-id>
      - Deck: Android
      - Source: <how found: validation-error | weak-note | gap | duplicate>
      - File: <path to card file if known>
      - Current content summary: <brief>
      ```

      If no unprocessed Android cards remain, write "ALL CARDS PROCESSED" to scratchpad
      and stop (the user should cancel the loop).

      Publish event: `card.selected`

  analyst:
    name: "Card Analyst"
    description: "Diagnose quality issues on the selected Android card"
    triggers:
      - "card.selected"
    publishes:
      - "analysis.done"
    instructions: |
      ## Analyze Android Card

      You are the Card Analyst. Diagnose all quality issues for the selected Android card.

      ### Process

      1. Read `.ralph/scratchpad.md` for the selected card
      2. If scratchpad says "ALL CARDS PROCESSED", publish `analysis.done` with no action
      3. Read the card file (if file path known)
      4. Run diagnostics:
         ```bash
         cargo run --bin anki-atlas -- validate <file> --quality
         cargo run --bin anki-atlas -- search "<card question>" --semantic --top 5
         cargo run --bin anki-atlas -- tag-audit
         ```
      5. Check for:
         - Missing bilingual pair (EN + RU)
         - Tag violations (missing difficulty, wrong `android::` prefix format)
         - Anti-patterns (sets, enumerations, vague questions)
         - Near-duplicates (similarity > 0.85)
         - Answer too long (> 100 words, relaxed for code examples)
         - Missing context (card doesn't make sense alone)
         - **Mastery depth**: does the card test understanding or just recall?
           - Elementary: "What is X?" -> needs reformulation
           - Syntax-only code -> needs "when/why" reasoning
         - **Skill relevance**: check for dead skill patterns
           - Dead: syntax recall, boilerplate, rote lookup
           - Alive: system design, debugging, tradeoffs, architectural reasoning

      ### Output

      Append to `.ralph/scratchpad.md`:
      ```
      ## Diagnosis
      - Validation: <pass/fail + details>
      - Mastery level: <elementary / adequate / mastery>
      - Relevance: <alive / neutral / dead + reason>
      - Duplicates: <none / list with scores>
      - Tag issues: <none / list>
      - Content issues: <none / list>
      - Recommended fix: <brief action plan>
      ```

      Publish event: `analysis.done`

  improver:
    name: "Card Improver"
    description: "Fix Android card content, tags, and format based on diagnosis"
    triggers:
      - "analysis.done"
      - "fix.needed"
    publishes:
      - "improved"
    instructions: |
      ## Improve Android Card

      You are the Card Improver. Fix the card based on the analyst's diagnosis.

      ### Process

      1. Read `.ralph/scratchpad.md` for diagnosis and selected card
      2. If diagnosis says no action needed, publish `improved` immediately
      3. On `fix.needed` trigger, read reviewer feedback from scratchpad
      4. Apply fixes:
         - **Tag issues**: fix tags per taxonomy (kebab-case, `::` separator, add `difficulty::` + `android::` topic)
         - **Content issues**: rewrite question/answer per card principles
         - **Missing pair**: create the missing EN or RU card (Cyrillic only, never transliteration)
         - **Anti-patterns**: split sets, rewrite vague questions
         - **Near-duplicate**: add distinguishing `[Context]` prefix or merge
         - **Format**: add bold terms, code blocks, proper structure
         - **Elementary -> Mastery reformulation**:
           - "What is ViewModel?" -> "When would you choose ViewModel over rememberSaveable, and what trade-offs?"
           - "What is Compose?" -> "When would you choose Compose over View system, and why?"
           - "List lifecycle methods" -> Split into individual cards with "when/why" for each
           - Syntax-only -> Add "when to use" + trade-offs + pitfalls
         - **Dead skill pattern**: transform the card:
           - Syntax recall -> "When/why would you use this?" or "What goes wrong if you get this wrong?"
           - Boilerplate -> "What problem does this pattern solve?" or "Compare with alternatives"
           - Pure lookup -> Tag with `skill::dead` and recommend suspension
         - **Alive skill pattern**: tag with `skill::alive`
         - **Neutral**: tag with `skill::neutral` if no clear signal
      5. Self-check: `cargo run --bin anki-atlas -- validate <file> --quality`

      ### Quality Standards (Mastery-Oriented)

      - Atomic: one concept per card (with appropriate depth)
      - Active recall: "when/how/why", not yes/no or "what is"
      - Concise: answer under 100 words (longer OK for code + reasoning)
      - Bilingual: EN + RU (Cyrillic only, never transliteration)
      - Tagged: `difficulty::` + `android::` topic + `skill::` tags
      - Precise technical terminology (ViewModel, LazyColumn, Composable)
      - Connect to related concepts or principles
      - Test application and reasoning, not recognition

      ### Output

      Update the card file with improvements.
      Append to `.ralph/scratchpad.md`:
      ```
      ## Improvements Applied
      - Changes: <list of what changed>
      - Mastery level: <before> -> <after>
      - Self-validation: <pass/fail>
      ```

      Publish event: `improved`

  reviewer:
    name: "Card Reviewer"
    description: "Validate improvement, update progress, commit or send back for rework"
    triggers:
      - "improved"
    publishes:
      - "round.done"
      - "fix.needed"
    instructions: |
      ## Review Android Card Improvement

      You are the Card Reviewer. Validate the improvement and decide: accept or rework.

      ### Process

      1. Read `.ralph/scratchpad.md` for the card ID and improvements
      2. If no action was needed, skip to step 5 (round.done)
      3. Run final validation:
         ```bash
         cargo run --bin anki-atlas -- validate <file> --quality
         cargo run --bin anki-atlas -- tag-audit
         ```
      4. Decision:
         - **PASS**: proceed to step 5. Verify:
           - Card has `skill::` tag and no relevance warnings
           - Card tests understanding, not just recall (mastery level)
           - Tags include `android::` prefix and `difficulty::`
           - Bilingual pair exists (EN + RU)
         - **FAIL (first time)**: append feedback to scratchpad, publish `fix.needed`
         - **FAIL (second time)**: skip card, log reason, proceed to step 5

      ### On PASS or Skip

      5. Update `.ralph/card-progress.md`:
         ```
         | <card-id> | <timestamp> | <action> | <quality-before> | <quality-after> |
         ```
         Actions: `fixed-tags`, `rewritten`, `split`, `merged`, `added-pair`, `transformed-dead`, `suspended-dead`, `skipped`

      6. Git commit:
         ```bash
         git add -A && git commit -m "improve(cards): <card-id> - <action>"
         ```

      7. Clear `.ralph/scratchpad.md` for next iteration

      Publish event: `round.done`

      ### On FAIL (rework)

      Append to `.ralph/scratchpad.md`:
      ```
      ## Reviewer Feedback (attempt N)
      - Issues: <what still fails>
      - Fix: <specific instructions>
      ```

      Publish event: `fix.needed`
